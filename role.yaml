apiVersion: rbac.authorization.k8s.io/v1 
kind: Role 
metadata:
  name: roboshop-role
  namespace: roboshop 
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list","get","watch"]
---
apiVersion: rbac.authorization.k8s.io/v1 
kind: RoleBinding
metadata:
  name: roboshop-role-binding 
  namespace: roboshop
subjects:
- kind: User 
  name: john
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: roboshop-role
  apiGroup: rbac.authorization.k8s.io
