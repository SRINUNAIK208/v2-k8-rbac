apiVersion: rbac.authorization.k8s.io/v1 
kind: Role 
metadata:
  name: roboshop-sa 
  namespace: roboshop
rules:
- apiGroups: [""]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1 
kind: RoleBinding
metadata:
  names: roboshop-sa-rolebinding
  namespace: roboshop
subjects:
- kind: serviceAccount
  name: aws-secret-manager-sa 
  namespace: roboshop
roleRef:
  kind: Role
  name: roboshop-sa 
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1 
kind: Pod 
metadata:
  name: aws-cli 
  namespace: roboshop
spec:
 containers:
 - name: aws-cli
   image: amazon/aws-cli
